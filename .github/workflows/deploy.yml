name: Deploy URL Shortener

"on":
  push:
    branches: [main, dev]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy-production:
    needs: checks
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t asia-south1-docker.pkg.dev/express-app-498710/express-app/url-shortener:latest .
          docker push asia-south1-docker.pkg.dev/express-app-498710/express-app/url-shortener:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy url-shortener \
            --image asia-south1-docker.pkg.dev/express-app-498710/express-app/url-shortener:latest \
            --platform managed \
            --region asia-south1 \
            --port 3000 \
            --allow-unauthenticated \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,BASE_URL=BASE_URL:latest